<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciamento de Clientes</title>
    <link rel="stylesheet" href="telaAdm.css">
</head>

<body>

    <div class="container">

        <!-- TOPO -->
        <section class="top-bar">

            <div class="logo-title">
                <img src="./img/Made with insMind-.png" alt="Logo da Empresa" class="logo">
                <h1>Gerenciamento de Clientes</h1>
            </div>

            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Buscar por nome..." onkeyup="buscarCliente()">
                <button onclick="buscarCliente()">
                    🔍
                </button>
            </div>

        </section>


        <!-- TABELA -->
        <div class="table-container">

            <table id="clientesTable">

                <thead>
                    <tr>
                        <th>Nome</th>
                        <th>CPF</th>
                        <th>Telefone</th>
                        <th>Status</th>
                        <th>Ações</th>
                    </tr>
                </thead>

                <tbody id="clientesBody">

                    <!-- EXEMPLO DE LINHA (remova depois se quiser) -->
                    <tr>
                        <td>João Silva</td>
                        <td>123.456.789-00</td>
                        <td>(12) 99999-9999</td>
                        <td>
                            <span class="status ativo">Ativo</span>
                        </td>
                        <td class="actions">
                            <button class="btn-edit" onclick="abrirModal()">Editar</button>
                            <a class="btn-delete">Excluir</a>
                        </td>
                    </tr>

                    <tr>
                        <td>Maria Oliveira</td>
                        <td>987.654.321-00</td>
                        <td>(12) 98888-8888</td>
                        <td>
                            <span class="status inativo">Inativo</span>
                        </td>
                        <td class="actions">
                            <button class="btn-edit" onclick="abrirModal()">Editar</button>
                            <a href="../PaginaClientes/telaCliente.html" class="btn-delete">Excluir</a>
                        </td>
                    </tr>

                </tbody>

            </table>

        </div>

    </div>


    <!-- MODAL -->
    <div id="modalCliente" class="modal">
        <div class="modal-content">

            <span class="fechar" onclick="fecharModal()">×</span>

            <h2>Dados do Cliente</h2>

            <form class="client-form">

                <div class="form-group">
                    <label>Nome</label>
                    <input type="text" placeholder="Digite o nome completo">
                </div>

                <div class="form-group">
                    <label>CPF</label>
                    <input type="text" placeholder="000.000.000-00">
                </div>

                <div class="form-group">
                    <label>Telefone</label>
                    <input type="text" placeholder="(00) 00000-0000">
                </div>

                <div class="form-group">
                    <label>Email</label>
                    <input type="email" placeholder="email@exemplo.com">
                </div>

                <div class="form-group">
                    <label>Valor Emprestado</label>
                    <input type="number" placeholder="R$ 0,00">
                </div>

                <div class="form-group">
                    <label>Qtd. Parcelas</label>
                    <input type="text" placeholder="Digite o número de parcelas">
                </div>

                <div class="form-group">
                    <label>Status</label>
                    <select>
                        <option>Ativo</option>
                        <option>Inativo</option>
                    </select>
                </div>

                <div class="form-buttons">
                    <button type="submit" class="btn-save">Salvar</button>
                    <button type="button" class="btn-cancel">Cancelar</button>
                </div>

            </form>

        </div>
            <script src="carregarClientes.js"></script>

    </div>

</body>

</html>
